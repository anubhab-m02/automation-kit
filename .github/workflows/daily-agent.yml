name: Daily Agent Task Runner

# Reusable workflow. Consumer repos call this via:
#   jobs:
#     run:
#       uses: anubhab-m02/automation-kit/.github/workflows/daily-agent.yml@main
#       secrets:
#         CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
#         GH_PAT: ${{ secrets.GH_PAT }}
#
# Auth: uses a Claude Pro/Max subscription OAuth token (generated locally via
# `claude setup-token`), not a metered Anthropic API key — usage draws from
# the subscription, not pay-per-token billing. GH_PAT (a fine-grained PAT
# owned by the repo owner, scoped to contents/PRs/issues read-write) makes
# PRs, comments, and labels land as the owner instead of the Claude GitHub
# App identity — set it if you don't want an app identity showing up at all.
#
# Design: rolling-branch delivery. Skip entirely if the backlog is empty
# (zero cost). Otherwise: fast-forward `agent/rolling` onto `main` (creating
# it from main if absent), attempt up to 3 eligible `daily-task` issues
# (priority-labeled first, then lowest issue number) inside a bounded
# turn/tool budget, commit each completed issue separately, label it
# `in-pr`, and open or update the single rolling PR from `agent/rolling` to
# `main`. Never pushes to the default branch directly — only merging that
# PR does, and only a human does that.
#
# Issue labels this convention relies on (create these in the consumer
# repo): daily-task, priority, in-pr, needs-input, needs-triage.

on:
  workflow_call:
    inputs:
      max_turns:
        description: "Max agent turns per run (budget cap)"
        required: false
        type: number
        default: 100
      max_issues:
        description: "Max issues to attempt in one run"
        required: false
        type: number
        default: 3
      rolling_branch:
        description: "Name of the long-lived branch the agent accumulates work on"
        required: false
        type: string
        default: "agent/rolling"
      random_window_minutes:
        description: >-
          On scheduled (cron) runs only, sleep a random amount up to this many
          minutes before doing anything, so the actual work-start time varies
          day to day instead of landing at a fixed clock time. Set the cron
          trigger to the start of your target window and this to the window's
          length. Ignored on manual (workflow_dispatch) runs.
        required: false
        type: number
        default: 180
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      GH_PAT:
        required: false

jobs:
  find-task:
    runs-on: ubuntu-latest
    outputs:
      has_task: ${{ steps.pick.outputs.has_task }}
      candidates: ${{ steps.pick.outputs.candidates }}
      rolling_pr: ${{ steps.pick.outputs.rolling_pr }}
    steps:
      - name: Randomize start time within the target window
        if: github.event_name == 'schedule'
        env:
          WINDOW_MINUTES: ${{ inputs.random_window_minutes }}
        run: |
          set -euo pipefail
          sleep_secs=$(( RANDOM % (WINDOW_MINUTES * 60) ))
          echo "Sleeping ${sleep_secs}s (up to ${WINDOW_MINUTES}m window) before starting..."
          sleep "$sleep_secs"

      - name: Pick eligible daily-task issues
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_ISSUES: ${{ inputs.max_issues }}
          ROLLING_BRANCH: ${{ inputs.rolling_branch }}
        run: |
          set -euo pipefail

          # Eligible: open + daily-task, minus in-pr, minus needs-input.
          # Priority-labeled issues first, then lowest issue number.
          # --limit is required: gh issue list defaults to 30 results sorted
          # newest-created-first, which silently drops the oldest (lowest-
          # numbered, highest-priority) issues once the backlog grows past
          # 30 — exactly the issues this picker is supposed to favor.
          all=$(gh issue list --repo "${{ github.repository }}" \
            --label daily-task --state open --limit 1000 \
            --json number,title,labels)

          eligible=$(echo "$all" | jq -c '
            [ .[] | select(
                (.labels | map(.name) | index("in-pr") | not) and
                (.labels | map(.name) | index("needs-input") | not)
              ) ]
            | sort_by(.number)
            | (map(select(.labels | map(.name) | index("priority"))) +
               map(select(.labels | map(.name) | index("priority") | not)))
          ')

          candidates=$(echo "$eligible" | jq -c --argjson n "$MAX_ISSUES" '[.[:$n][] | {number, title}]')
          count=$(echo "$candidates" | jq 'length')

          if [ "$count" -eq 0 ]; then
            echo "No eligible daily-task issues — skipping run."
            echo "has_task=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_task=true" >> "$GITHUB_OUTPUT"
            echo "candidates=$candidates" >> "$GITHUB_OUTPUT"
          fi

          rolling_pr=$(gh pr list --repo "${{ github.repository }}" \
            --head "$ROLLING_BRANCH" --state open \
            --json number --jq '.[0].number // empty')
          echo "rolling_pr=$rolling_pr" >> "$GITHUB_OUTPUT"

  run-agent:
    needs: find-task
    if: needs.find-task.outputs.has_task == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare rolling branch
        env:
          GH_TOKEN: ${{ github.token }}
          ROLLING_BRANCH: ${{ inputs.rolling_branch }}
        run: |
          set -euo pipefail
          git config --global user.name "${{ github.repository_owner }}"
          git config --global user.email "${{ github.repository_owner }}@users.noreply.github.com"

          default_branch=$(gh repo view "${{ github.repository }}" --json defaultBranchRef --jq '.defaultBranchRef.name')

          if git ls-remote --exit-code --heads origin "$ROLLING_BRANCH" >/dev/null 2>&1; then
            git checkout -B "$ROLLING_BRANCH" "origin/$ROLLING_BRANCH"
            # Bring in anything merged/pushed to the default branch since agent/rolling last moved.
            git merge --no-edit "origin/$default_branch" || {
              echo "::error::$ROLLING_BRANCH has a conflict merging $default_branch that needs human resolution."
              exit 1
            }
          else
            git checkout -B "$ROLLING_BRANCH"
          fi

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_PAT }}
          bot_name: ${{ github.repository_owner }}
          bot_id: ${{ github.repository_owner_id }}
          claude_args: >-
            --max-turns ${{ inputs.max_turns }}
            --allowedTools "Read,Edit,Write,Glob,Grep,Bash(git *),Bash(gh *),Bash(npm *),Bash(pip *),Bash(pytest *),Bash(python *)"
          prompt: |
            You are the unattended daily contributor for this repository. You work on
            the branch `${{ inputs.rolling_branch }}` (already checked out and up to
            date with the default branch) — this branch accumulates work across many
            unattended runs until a human reviews and merges it, so day-to-day progress
            does not depend on that merge happening.

            Candidate issues, in the order you should attempt them (priority-labeled
            issues first, then lowest number first):
            ${{ needs.find-task.outputs.candidates }}

            Existing rolling PR number (empty if none yet): "${{ needs.find-task.outputs.rolling_pr }}"

            Ground rules:
            1. Read CLAUDE.md, ROADMAP.md, and docs/ARCHITECTURE.md first for project
               context and conventions. For each issue, read only the files it
               references or that are clearly required to implement it — do not explore
               the whole repository speculatively.
            2. Work through the candidates in the given order. Complete between 1 and
               ${{ inputs.max_issues }} of them, stopping cleanly after finishing your
               current issue if you're running low on turn budget — never leave an issue
               half-implemented. It is fine and expected to complete fewer than the
               listed candidates.
            3. For each issue: implement ONLY its scope (no unrelated refactors), commit
               it as its own small set of logically separate commits (e.g. scaffold,
               core implementation, tests), then label that issue `in-pr` via
               `gh issue edit <n> --add-label in-pr` — do not close it, the rolling PR's
               "Closes #n" list will close it on merge.
            4. Never commit directly to the default branch — you are already on
               `${{ inputs.rolling_branch }}`. After completing each issue, push the
               branch immediately (don't batch pushes until the very end) so progress
               survives even if a later issue in this run fails.
            5. PR management: the PR title must describe the actual work it contains, not
               a generic label like "Daily agent progress" — e.g. "Backend foundation:
               config, models, Chroma store" or "GitHub ingestion client + fixtures".
               If the existing rolling PR number above is non-empty, update that PR's
               body to append `Closes #n` for each issue you completed this run (keep
               existing entries, don't remove any), add a short changelog line, and
               update the PR title to summarize the PR's full current contents (not just
               this run's additions) if the title no longer fits after this run's work.
               If it's empty, open a new PR from `${{ inputs.rolling_branch }}` to the
               default branch with a body listing `Closes #n` for each issue completed
               so far and a title summarizing this run's work.
            6. Do not add any AI/bot attribution to commits, PR bodies, or issue
               comments (no "Co-Authored-By: Claude", no mention of AI authorship). Git
               identity is already configured to the repository owner.
            7. If a candidate issue has a genuine ambiguity, a design decision only a
               human should make, a missing credential, or is materially bigger than
               scoped: stop working on that issue specifically, comment on it explaining
               what's needed, label it `needs-input`, and move on to the next candidate
               instead. Do not guess on judgment calls.
            8. If, while implementing an issue, you notice one clearly-scoped piece of
               genuinely meaningful follow-up work — not busywork — you may open at most
               ONE new issue for the whole run, labeled `needs-triage` (never
               `daily-task` directly). If nothing meaningful comes to mind, don't force
               one.
            9. Keep each issue's diff proportional to its scope — these are small daily
               tasks, not a rewrite.
